# Open Fusion presets (reference mirror).
#
# The authoritative copy lives in src/open_fusion/config.py (_PRESETS) so the package
# stays dependency-free with no YAML parser at runtime. This file documents the same
# values for humans and for hand-editing; copy changes back into config.py.
#
# Slugs are OpenRouter-style and DRIFT over time. Verify current slugs at
# https://openrouter.ai/models or override on the CLI with --panel / --judge.

quality:
  # ~3x+ the cost of one frontier model; buys the quality ceiling, not savings.
  panel:
    - anthropic/claude-opus-4.1
    - openai/gpt-5
  judge: anthropic/claude-opus-4.1

budget:
  # ~0.4-0.5x a single frontier model while approaching it.
  panel:
    - openai/gpt-5-mini
    - google/gemini-2.5-flash
    - deepseek/deepseek-chat
  judge: openai/gpt-5-mini
